<!DOCTYPE html>

<head>

<title>NailMind Tokyo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0908;--surface:#111010;--card:#161412;
  --border:rgba(255,255,255,0.06);--gold:#c8a96d;--gold2:#e6cfa0;
  --cream:#f4ede4;--muted:rgba(244,237,228,0.42);
  --font-d:'Cormorant Garamond',serif;--font-b:'Zen Kaku Gothic New',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--cream);font-family:var(--font-b);font-weight:300;overflow-x:hidden;max-width:430px;margin:0 auto;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.5;}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:rgba(10,9,8,0.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-logo-wrap{display:flex;align-items:center;}
.nav-logo-img{height:52px;width:auto;object-fit:contain;}
.nav-logo-placeholder{font-family:var(--font-d);font-size:1.3rem;letter-spacing:0.2em;color:var(--gold2);}
.nav-book{font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(200,169,109,0.35);padding:8px 16px;text-decoration:none;transition:all 0.3s;white-space:nowrap;}
.nav-book:hover{background:rgba(200,169,109,0.1);}

/* CAROUSEL */
.carousel-wrap{position:relative;width:100%;overflow:hidden;background:var(--surface);}
.carousel-track{display:flex;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);}
.carousel-slide{min-width:100%;aspect-ratio:3/2;position:relative;overflow:hidden;flex-shrink:0;background:var(--card);}
.carousel-slide img{width:100%;height:100%;object-fit:cover;}
.slide-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:linear-gradient(145deg,#1a1510,#2a1f14,#1e1812);}
.slide-ph-icon{font-size:4rem;opacity:0.1;color:var(--gold);}
.slide-ph-text{font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);opacity:0.5;}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,9,8,0.75) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:28px 20px;pointer-events:none;}
.slide-label{font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.slide-title{font-family:var(--font-d);font-size:2rem;font-weight:300;line-height:1.1;color:var(--cream);}
.carousel-dots{display:flex;justify-content:center;gap:6px;padding:12px 0 8px;background:var(--surface);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted);transition:all 0.3s;cursor:pointer;}
.dot.active{background:var(--gold);width:20px;border-radius:3px;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(10,9,8,0.55);border:1px solid var(--border);color:var(--gold);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;z-index:10;backdrop-filter:blur(4px);transition:all 0.3s;}
.btn-prev{left:12px;}.btn-next{right:12px;}

/* SECTION */
.sec-head{padding:32px 20px 18px;border-bottom:1px solid var(--border);}
.sec-eyebrow{font-size:0.56rem;letter-spacing:0.32em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.sec-eyebrow::before{content:'';width:18px;height:1px;background:rgba(200,169,109,0.5);}
.sec-title{font-family:var(--font-d);font-size:1.8rem;font-weight:300;line-height:1.1;}
.sec-title em{font-style:italic;color:var(--gold2);}
.sec-sub{font-size:0.65rem;letter-spacing:0.06em;color:var(--muted);margin-top:6px;line-height:1.7;}

/* SERVICE */
.service-list{padding-bottom:40px;}
.service-item{border-bottom:1px solid var(--border);overflow:hidden;}
.service-header{display:flex;align-items:stretch;cursor:pointer;transition:background 0.25s;-webkit-tap-highlight-color:transparent;min-height:80px;}
.service-header:active{background:rgba(200,169,109,0.04);}
.svc-thumb{width:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border-right:1px solid var(--border);}
.svc-thumb img{width:100%;height:100%;object-fit:cover;}
.svc-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--gold);opacity:0.15;}
.svc-info{flex:1;display:flex;flex-direction:column;justify-content:center;padding:14px 12px;gap:4px;}
.svc-num{font-family:var(--font-d);font-size:0.7rem;color:var(--gold);opacity:0.6;letter-spacing:0.1em;}
.svc-name{font-size:0.8rem;letter-spacing:0.04em;line-height:1.35;font-weight:300;}
.svc-arrow{display:flex;align-items:center;justify-content:center;padding:0 16px;color:var(--gold);font-size:0.7rem;opacity:0.5;transition:all 0.35s;flex-shrink:0;}
.service-item.open .svc-arrow{opacity:1;transform:rotate(180deg);}
.service-body{max-height:0;overflow:hidden;transition:max-height 0.45s cubic-bezier(0.25,0.46,0.45,0.94);}
.service-item.open .service-body{max-height:500px;}
.service-inner{padding:12px 16px 20px;}
.photo-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.photo-strip::-webkit-scrollbar{display:none;}
.photo-item-wrap{flex-shrink:0;width:110px;}
.photo-item{width:110px;height:146px;overflow:hidden;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:0.18;font-size:1.2rem;}
.photo-item img{width:100%;height:100%;object-fit:cover;opacity:0.9;}
.photo-caption{font-size:0.62rem;color:var(--muted);padding:5px 2px;line-height:1.4;letter-spacing:0.04em;word-break:break-all;}
.book-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:transparent;border:1px solid rgba(200,169,109,0.35);color:var(--gold2);font-family:var(--font-b);font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all 0.3s;}
.book-btn:hover{background:rgba(200,169,109,0.08);border-color:var(--gold);}

/* SHOP INFO */
.shop-section{background:var(--surface);border-top:1px solid var(--border);padding:40px 20px 32px;}
.shop-logo-text{font-family:var(--font-d);font-size:1.6rem;letter-spacing:0.22em;color:var(--gold2);margin-bottom:6px;}
.shop-tagline{font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:28px;}
.shop-divider{width:32px;height:1px;background:rgba(200,169,109,0.35);margin-bottom:24px;}
.shop-block{display:flex;gap:14px;margin-bottom:20px;align-items:flex-start;}
.shop-icon{font-size:0.9rem;opacity:0.6;flex-shrink:0;margin-top:2px;color:var(--gold);}
.shop-text{font-size:0.72rem;letter-spacing:0.06em;line-height:1.75;color:var(--cream);opacity:0.8;}
.shop-access-tag{display:inline-block;font-size:0.52rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(200,169,109,0.3);padding:3px 10px;margin-top:6px;}
.line-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:16px;padding:15px;background:rgba(6,199,85,0.08);border:1px solid rgba(6,199,85,0.25);color:#06c755;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;transition:all 0.3s;}
.social-row{display:flex;gap:12px;margin-top:16px;}
.social-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--border);color:var(--muted);font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;text-decoration:none;transition:all 0.3s;flex:1;justify-content:center;}
.social-btn:hover{border-color:var(--gold);color:var(--gold2);}
.social-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0;}
.shop-copy{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);font-size:0.52rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);opacity:0.6;text-align:center;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--muted);font-size:0.7rem;letter-spacing:0.2em;}

/* thumb gradients */
.tg0{background:linear-gradient(135deg,#1e1812,#2a2016);}
.tg1{background:linear-gradient(135deg,#101620,#182030);}
.tg2{background:linear-gradient(135deg,#1c1018,#281520);}
.tg3{background:linear-gradient(135deg,#101a10,#182618);}
.tg4{background:linear-gradient(135deg,#1e1410,#2a1c12);}
.tg5{background:linear-gradient(135deg,#10141e,#141a28);}
.tg6{background:linear-gradient(135deg,#1a1018,#261422);}
.tg7{background:linear-gradient(135deg,#141e12,#1c2a18);}
</style>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, getDoc, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAw9pjrHQB42F8a58819Eda6dypaFdo4Yc",
  authDomain: "nailmind-9e30e.firebaseapp.com",
  projectId: "nailmind-9e30e",
  storageBucket: "nailmind-9e30e.firebasestorage.app",
  messagingSenderId: "555186958654",
  appId: "1:555186958654:web:3682988a915c3a06857c6f",
  measurementId: "G-4F69XJX2L1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const thumbGrads = ['tg0','tg1','tg2','tg3','tg4','tg5','tg6','tg7'];

// Load logo
async function loadSettings() {
  try {
    const snap = await getDoc(doc(db, 'settings', 'general'));
    if (snap.exists()) {
      const d = snap.data();
      if (d.logoUrl) {
        const wrap = document.getElementById('navLogoWrap');
        wrap.innerHTML = `<img src="${d.logoUrl}" class="nav-logo-img" alt="NailMind"/>`;
      }
      if (d.bookingUrl) {
        document.querySelector('.nav-book').href = d.bookingUrl;
        document.querySelector('.line-btn').href = d.bookingUrl;
      }
    }
  } catch(e) { console.log('Settings:', e); }
}

// Load carousel
async function loadCarousel() {
  try {
    const snap = await getDocs(query(collection(db, 'carousel'), orderBy('order')));
    const slides = [];
    snap.forEach(d => slides.push(d.data()));

    const track = document.getElementById('track');
    const dotsWrap = document.getElementById('dots');

    if (slides.length === 0) {
      track.innerHTML = `<div class="carousel-slide"><div class="slide-ph"><div class="slide-ph-icon">◈</div><div class="slide-ph-text">写真を追加してください</div></div></div>`;
      dotsWrap.innerHTML = '';
      return;
    }

    track.innerHTML = slides.map(s => `
      <div class="carousel-slide">
        ${s.imageUrl ? `<img src="${s.imageUrl}" alt="${s.title||''}" loading="lazy"/>` : '<div class="slide-ph"><div class="slide-ph-icon">◈</div></div>'}
        ${(s.title||s.label) ? `<div class="slide-overlay"><div class="slide-label">${s.label||''}</div><div class="slide-title">${s.title||''}</div></div>` : ''}
      </div>
    `).join('');

    dotsWrap.innerHTML = '';
    const dotEls = slides.map((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i===0?' active':'');
      d.onclick = () => goTo(i);
      dotsWrap.appendChild(d);
      return d;
    });

    let cur = 0;
    let autoTimer;
    function goTo(n) {
      cur = (n + slides.length) % slides.length;
      track.style.transform = `translateX(-${cur*100}%)`;
      dotEls.forEach((d,i) => d.classList.toggle('active', i===cur));
      clearInterval(autoTimer);
      autoTimer = setInterval(() => goTo(cur+1), 4000);
    }
    document.getElementById('prev').onclick = () => goTo(cur-1);
    document.getElementById('next').onclick = () => goTo(cur+1);
    let sx=0;
    track.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
    track.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)goTo(cur+(dx<0?1:-1));},{passive:true});
    autoTimer = setInterval(() => goTo(cur+1), 4000);
  } catch(e) { console.log('Carousel:', e); }
}

// Load services
async function loadServices() {
  try {
    const snap = await getDocs(query(collection(db, 'services'), orderBy('order')));
    const services = [];
    snap.forEach(d => services.push({id: d.id, ...d.data()}));

    const list = document.getElementById('serviceList');

    if (services.length === 0) {
      list.innerHTML = '<div class="loading">メニューを追加してください</div>';
      return;
    }

    list.innerHTML = '';
    services.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'service-item';
      const photos = s.photos || [];
      item.innerHTML = `
        <div class="service-header">
          <div class="svc-thumb ${thumbGrads[i%8]}">
            ${photos[0] ? `<img src="${photos[0]}" alt="${s.name}" loading="lazy"/>` : '<div class="svc-thumb-ph">◈</div>'}
          </div>
          <div class="svc-info">
            <div class="svc-num">${String(i+1).padStart(2,'0')}</div>
            <div class="svc-name">${s.name}</div>
          </div>
          <div class="svc-arrow">▾</div>
        </div>
        <div class="service-body">
          <div class="service-inner">
            <div class="photo-strip">
              ${photos.length > 0
                ? photos.map(p => `<div class="photo-item"><img src="${p}" loading="lazy"/></div>`).join('')
                : '<div class="photo-item">◈</div><div class="photo-item">◈</div><div class="photo-item">◈</div>'
              }
            </div>
            ${s.bookingUrl ? `<a href="${s.bookingUrl}" class="book-btn" target="_blank">📅　このメニューを予約する</a>` : '<div class="book-btn" style="opacity:0.4;cursor:default;">📅　予約リンク準備中</div>'}
          </div>
        </div>
      `;
      item.querySelector('.service-header').onclick = () => {
        const isOpen = item.classList.contains('open');
        document.querySelectorAll('.service-item.open').forEach(el => el.classList.remove('open'));
        if (!isOpen) item.classList.add('open');
      };
      list.appendChild(item);
    });
  } catch(e) { console.log('Services:', e); list.innerHTML = '<div class="loading">エラーが発生しました</div>'; }
}

loadSettings();
loadCarousel();
loadServices();
</script>
</body>

.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,9,8,0.75) 0%,rgba(10,9,8,0.1) 60%,transparent 100%);}
.hero-content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:36px 24px;}
.hero-eyebrow{font-size:0.55rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;opacity:0;animation:fadeUp 0.8s 0.2s forwards;}
.hero-title{font-family:var(--font-d);font-size:2.2rem;font-weight:300;line-height:1.1;margin-bottom:10px;opacity:0;animation:fadeUp 0.8s 0.4s forwards;}
.hero-title em{font-style:italic;color:var(--gold2);}

.hero-sub{font-size:0.7rem;letter-spacing:0.1em;color:var(--muted);line-height:1.8;opacity:0;animation:fadeUp 0.8s 0.6s forwards;}

.sec-head{padding:32px 20px 18px;border-bottom:1px solid var(--border);}
.sec-eyebrow{font-size:0.56rem;letter-spacing:0.32em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.sec-eyebrow::before{content:'';width:18px;height:1px;background:rgba(200,169,109,0.5);}
.sec-title{font-family:var(--font-d);font-size:1.8rem;font-weight:300;line-height:1.1;}
.sec-title em{font-style:italic;color:var(--gold2);}
.sec-sub{font-size:0.65rem;letter-spacing:0.06em;color:var(--muted);margin-top:6px;line-height:1.7;}

.service-list{padding-bottom:40px;}
.service-item{border-bottom:1px solid var(--border);overflow:hidden;}
.service-header{display:flex;align-items:stretch;cursor:pointer;transition:background 0.25s;-webkit-tap-highlight-color:transparent;min-height:80px;}
.service-header:active{background:rgba(200,169,109,0.04);}
.svc-thumb{width:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border-right:1px solid var(--border);}
.svc-thumb img{width:100%;height:100%;object-fit:cover;object-position:center;}
.svc-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--gold);opacity:0.3;}
.svc-info{flex:1;display:flex;flex-direction:column;justify-content:center;padding:14px 12px;gap:4px;}
.svc-num{font-family:var(--font-d);font-size:0.7rem;color:var(--gold);opacity:0.6;letter-spacing:0.1em;}
.svc-name{font-size:0.8rem;letter-spacing:0.04em;line-height:1.35;font-weight:300;}
.svc-arrow{display:flex;align-items:center;justify-content:center;padding:0 16px;color:var(--gold);font-size:0.7rem;opacity:0.5;transition:all 0.35s;flex-shrink:0;}
.service-item.open .svc-arrow{opacity:1;transform:rotate(180deg);}
.service-body{max-height:0;overflow:hidden;transition:max-height 0.45s cubic-bezier(0.25,0.46,0.45,0.94);}
.service-item.open .service-body{max-height:500px;}
.service-inner{padding:12px 16px 20px;}
.photo-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.photo-strip::-webkit-scrollbar{display:none;}
.photo-item-wrap{flex-shrink:0;width:110px;}
.photo-item{width:110px;height:110px;overflow:hidden;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:1.2rem;}
.photo-item img{width:100%;height:100%;object-fit:cover;object-position:center;opacity:1;cursor:pointer;}
.photo-caption{font-size:0.62rem;color:var(--muted);padding:5px 2px;line-height:1.4;letter-spacing:0.04em;word-break:break-all;}
.book-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:transparent;border:1px solid rgba(200,169,109,0.35);color:var(--gold2);font-family:var(--font-b);font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all 0.3s;}
.book-btn:hover{background:rgba(200,169,109,0.08);border-color:var(--gold);}

.shop-section{background:var(--surface);border-top:1px solid var(--border);padding:40px 20px 32px;}
.foot-logo-img{height:60px;width:auto;object-fit:contain;margin-bottom:4px;}
.foot-logo-text{font-family:var(--font-d);font-size:1.6rem;letter-spacing:0.22em;color:var(--gold2);margin-bottom:6px;}
.shop-tagline{font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:28px;}
.shop-divider{width:32px;height:1px;background:rgba(200,169,109,0.35);margin-bottom:24px;}
.shop-block{display:flex;gap:14px;margin-bottom:20px;align-items:flex-start;}
.shop-icon{font-size:0.9rem;opacity:0.6;flex-shrink:0;margin-top:2px;color:var(--gold);}
.shop-text{font-size:0.72rem;letter-spacing:0.06em;line-height:1.75;color:var(--cream);opacity:0.8;}
.shop-access-tag{display:inline-block;font-size:0.52rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(200,169,109,0.3);padding:3px 10px;margin-top:6px;}

.line-btn:hover{background:rgba(6,199,85,0.14);}
.social-row{display:flex;gap:12px;margin-top:16px;}
.social-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--border);color:var(--muted);font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;text-decoration:none;transition:all 0.3s;flex:1;justify-content:center;}

.line-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px);}
.line-modal-bg.open{display:flex;}
.line-modal{background:var(--surface);border:1px solid var(--border);padding:32px 24px;width:100%;max-width:320px;text-align:center;}
.line-modal-icon{font-size:2.2rem;margin-bottom:12px;}
.line-modal-title{font-family:var(--font-d);font-size:1.3rem;color:var(--cream);margin-bottom:8px;}
.line-modal-sub{font-size:0.68rem;letter-spacing:0.08em;color:var(--muted);margin-bottom:24px;line-height:1.7;}
.line-modal-btns{display:flex;gap:10px;}
.line-modal-confirm{flex:1;padding:12px;background:rgba(6,199,85,0.1);border:1px solid rgba(6,199,85,0.35);color:#06c755;font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;}
.line-modal-cancel{flex:1;padding:12px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;}

.loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--muted);font-size:0.7rem;letter-spacing:0.2em;}
.tg0{background:linear-gradient(135deg,#1e1812,#2a2016);}
.tg1{background:linear-gradient(135deg,#101620,#182030);}
.tg2{background:linear-gradient(135deg,#1c1018,#281520);}
.tg3{background:linear-gradient(135deg,#101a10,#182618);}
.tg4{background:linear-gradient(135deg,#1e1410,#2a1c12);}
.tg5{background:linear-gradient(135deg,#10141e,#141a28);}
.tg6{background:linear-gradient(135deg,#1a1018,#261422);}
.tg7{background:linear-gradient(135deg,#141e12,#1c2a18);}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.reveal{opacity:0;transform:translateY(24px);transition:opacity 0.7s,transform 0.7s;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* LIGHTBOX */
.lightbox-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:600;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(12px);}
.lightbox-bg.open{display:flex;}
.lightbox-img{max-width:100%;max-height:80vh;object-fit:contain;border:1px solid var(--border);}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(200,169,109,0.15);border:1px solid var(--gold);color:var(--gold);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;}
.lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(200,169,109,0.15);border:1px solid rgba(200,169,109,0.3);color:var(--gold);width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;transition:all 0.3s;}
.lightbox-prev{left:12px;}
.lightbox-next{right:12px;}
.lightbox-prev:hover,.lightbox-next:hover{background:rgba(200,169,109,0.3);}
.lightbox-counter{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:0.65rem;letter-spacing:0.2em;color:var(--muted);}
</style>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,getDocs,doc,getDoc,orderBy,query}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyAw9pjrHQB42F8a58819Eda6dypaFdo4Yc",authDomain:"nailmind-9e30e.firebaseapp.com",projectId:"nailmind-9e30e",storageBucket:"nailmind-9e30e.firebasestorage.app",messagingSenderId:"555186958654",appId:"1:555186958654:web:3682988a915c3a06857c6f"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const tg=['tg0','tg1','tg2','tg3','tg4','tg5','tg6','tg7'];

async function loadSettings(){
  try{
    const snap=await getDoc(doc(db,'settings','general'));
    if(snap.exists()){
      const d=snap.data();
      if(d.logoUrl){
        document.getElementById('navLogoWrap').innerHTML=`<img src="${d.logoUrl}" class="nav-logo-img" alt="NailMind"/>`;
        document.getElementById('footLogoWrap').innerHTML=`<img src="${d.logoUrl}" class="foot-logo-img" alt="NailMind"/>`;
      }
      if(d.bookingUrl){document.getElementById('navBookBtn').href=d.bookingUrl;const hb=document.getElementById('heroBookBtn');if(hb)hb.href=d.bookingUrl;}
    }
  }catch(e){}
}

async function loadServices(){
  try{
    const snap=await getDocs(query(collection(db,'services'),orderBy('order')));
    const services=[];
    snap.forEach(d=>services.push({id:d.id,...d.data()}));
    const list=document.getElementById('serviceList');
    if(!services.length){list.innerHTML='<div class="loading">メニューを追加してください</div>';return;}
    list.innerHTML='';
    services.forEach((s,i)=>{
      const item=document.createElement('div');
      item.className='service-item';
      const photos=s.photos||[];
      const thumbUrl=photos[0]?(typeof photos[0]==='object'?photos[0].url:photos[0]):null;
      item.innerHTML=`
        <div class="service-header">
          <div class="svc-thumb ${tg[i%8]}">${thumbUrl?`<img src="${thumbUrl}" loading="lazy"/>`:'<div class="svc-thumb-ph">◈</div>'}</div>
          <div class="svc-info"><div class="svc-num">${String(i+1).padStart(2,'0')}</div><div class="svc-name">${s.name}</div></div>
          <div class="svc-arrow">▾</div>
        </div>
        <div class="service-body"><div class="service-inner">
          <div class="photo-strip">
            ${photos.length>0
              ?[...photos].reverse().map((p,idx,arr)=>{const url=typeof p==='object'?p.url:p;const cap=typeof p==='object'?(p.caption||''):'';const allUrls=arr.map(x=>typeof x==='object'?x.url:x);return`<div class="photo-item-wrap"><div class="photo-item"><img src="${url}" loading="lazy" onclick="openLightbox('${url}',[${allUrls.map(u=>`'${u}'`).join(',')}])"/></div>${cap?`<div class="photo-caption">${cap}</div>`:''}</div>`;}).join('')
              :'<div class="photo-item-wrap"><div class="photo-item">◈</div></div><div class="photo-item-wrap"><div class="photo-item">◈</div></div>'
            }
          </div>
          ${s.bookingUrl?`<a href="${s.bookingUrl}" class="book-btn" target="_blank">📅　このメニューを予約する</a>`:'<div class="book-btn" style="opacity:0.3;cursor:default;">予約リンク準備中</div>'}
        </div></div>`;
      item.querySelector('.service-header').onclick=()=>{
        const isOpen=item.classList.contains('open');
        document.querySelectorAll('.service-item.open').forEach(el=>el.classList.remove('open'));
        if(!isOpen)item.classList.add('open');
      };
      list.appendChild(item);
    });
  }catch(e){document.getElementById('serviceList').innerHTML='<div class="loading">エラー</div>';}
}

loadSettings();loadServices();
</script>

<!-- LIGHTBOX -->
<div class="lightbox-bg" id="lightboxBg" onclick="closeLightbox(event)">
  <div class="lightbox-close" onclick="closeLightboxDirect()">✕</div>
  <div class="lightbox-prev" id="lightboxPrev" onclick="lightboxNav(-1)">‹</div>
  <img class="lightbox-img" id="lightboxImg" src="" alt=""/>
  <div class="lightbox-next" id="lightboxNext" onclick="lightboxNav(1)">›</div>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>
<script>
let _lbUrls=[], _lbIdx=0;

function openLightbox(url, urls){
  _lbUrls = urls || [url];
  _lbIdx = _lbUrls.indexOf(url);
  if(_lbIdx<0) _lbIdx=0;
  showLightboxImg();
  document.getElementById('lightboxBg').classList.add('open');
  document.body.style.overflow='hidden';
}

function showLightboxImg(){
  document.getElementById('lightboxImg').src=_lbUrls[_lbIdx];
  document.getElementById('lightboxCounter').textContent=(_lbIdx+1)+' / '+_lbUrls.length;
  document.getElementById('lightboxPrev').style.display=_lbUrls.length>1?'flex':'none';
  document.getElementById('lightboxNext').style.display=_lbUrls.length>1?'flex':'none';
}

function lightboxNav(dir){
  _lbIdx=(_lbIdx+dir+_lbUrls.length)%_lbUrls.length;
  showLightboxImg();
}

function closeLightbox(e){if(e.target===document.getElementById('lightboxBg'))closeLightboxDirect();}
function closeLightboxDirect(){
  document.getElementById('lightboxBg').classList.remove('open');
  document.body.style.overflow='';
}

// Swipe support
let _lbSx=0;
document.getElementById('lightboxBg').addEventListener('touchstart',e=>_lbSx=e.touches[0].clientX,{passive:true});
document.getElementById('lightboxBg').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-_lbSx;
  if(Math.abs(dx)>40) lightboxNav(dx<0?1:-1);
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeLightboxDirect();
  if(e.key==='ArrowLeft') lightboxNav(-1);
  if(e.key==='ArrowRight') lightboxNav(1);
});
</script>
